[Service]
ExecStart=
ExecStart=/usr/sbin/clamonacc -F --fdpass --log=/var/log/clamav/clamonacc.log

# Lowest priority
Nice=19
CPUQuota=5%
CPUWeight=1
CPUSchedulingPolicy=idle
IOWeight=1
IOSchedulingClass=idle
IOSchedulingPriority=7

# Stop service from showing up as failed when stopped by gameboost
SuccessExitStatus=0 1 143 137 KILL
