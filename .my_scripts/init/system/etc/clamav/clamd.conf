LogFile /var/log/clamav/clamd.log
LogTime yes

ExtendedDetectionInfo yes

PidFile /run/clamav/clamd.pid
TemporaryDirectory /tmp
LocalSocket /run/clamav/clamd.ctl

# Exclude Steam and other game platforms
ExcludePath ^/proc/
ExcludePath ^/sys/
ExcludePath ^/.local/share/Steam/
ExcludePath ^/.steam/
ExcludePath ^/Games/
OnAccessExcludePath ^/.local/share/Steam/
OnAccessExcludePath ^/.steam/
OnAccessExcludePath ^/Games/
MaxDirectoryRecursion 20

# Virus event handling
VirusEvent /etc/clamav/virus-event.sh

User clamav

# Alert for encrypted files
AlertEncrypted no
AlertEncryptedArchive no
AlertEncryptedDoc no

# On-access scanning (experimental)
OnAccessPrevention yes
OnAccessExtraScanning yes
OnAccessMountPath /home
OnAccessExcludeUname clamav

# Additional scanning options
ScanPE yes
ScanELF yes
Bytecode yes
